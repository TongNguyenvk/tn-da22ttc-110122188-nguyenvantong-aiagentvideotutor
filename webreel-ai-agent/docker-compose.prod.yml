# ============================================================
# WebReel Production Stack
# API + Redis (INTERNAL ONLY) + Web Worker (with built-in Chrome)
# ============================================================
#
# SECURITY: Redis KHONG expose ra ngoai.
# Windows OS Worker ket noi qua SSH Tunnel:
#   ssh -N -L 6379:localhost:6379 user@vps-ip
#   set REDIS_URL=redis://localhost:6379/0
#   python -m worker.os_worker
#
# TRUOC KHI CHAY: Tao swap space 2-4GB tren VPS:
#   sudo fallocate -l 4G /swapfile
#   sudo chmod 600 /swapfile
#   sudo mkswap /swapfile
#   sudo swapon /swapfile
#   echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
#
# SECURITY HARDENING (Task 3):
#   - Tat ca container (tru autoscaler) chay worker process duoi user webreel (UID 1000)
#   - security_opt: no-new-privileges ngan leo thang dac quyen
#   - cap_drop: ALL cho Chromium workers (mat sandbox nhung duoc non-root isolation)
#   - Log rotation: max 10MB x 3 files cho moi container
#   - CPU limit: 2.0 cores cho workers
#

services:
  # --- MongoDB (persistent database) ---
  # Image chinh thuc, tu handle non-root (user mongodb)
  mongodb:
    image: mongo:7
    container_name: webreel-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-webreel}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-webreel_mongo_2026}
    volumes:
      - mongodb_data:/data/db
    networks:
      - db-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Security: Ngan process trong container leo thang dac quyen
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Redis (INTERNAL ONLY - khong expose port ra ngoai!) ---
  # Image chinh thuc, tu handle non-root (user redis)
  redis:
    image: redis:7-alpine
    container_name: webreel-redis
    # KHONG co ports: mapping -> chi container trong mang noi bo truy cap duoc
    # Bot scan (Shodan, masscan) se KHONG tim thay Redis cua ban
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-webreel_secret_2026}
      --protected-mode yes
      --bind 0.0.0.0
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-webreel_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    # Redis tham gia backend-net de autoscaler (cung backend-net) ket noi duoc
    # Task 4 se them db-net khi trien khai network isolation day du
    networks:
      - backend-net
      - db-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 320M

  # --- FastAPI Backend ---
  # Entrypoint khong dung docker-entrypoint.sh (CMD truc tiep uvicorn)
  # Nhung Dockerfile.backend da tao user webreel, nen can USER directive hoac gosu
  # API khong chay Chrome -> khong can cap_drop ALL
  api:
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.backend
    container_name: webreel-api
    # Khong expose port ra ngoai, truy cap qua Nginx reverse proxy /api/
    # Chay truc tiep duoi user webreel (UID 1000) - API khong can root vi khong co Xvfb/VNC
    user: "1000:1000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - MONGO_URL=mongodb://${MONGO_USER:-webreel}:${MONGO_PASSWORD:-webreel_mongo_2026}@mongodb:27017
      - MONGO_DB=webreel
      - OUTPUT_DIR=/app/output
      - CHROME_CDP_URL=http://session-manager:9222
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - PYTHONIOENCODING=utf-8
    volumes:
      - output_data:/app/output
      # Read-only access to OAuth credentials so the admin UI can report
      # accurate status. Refresh itself doesn't need this file (client
      # creds are embedded in the pickle), but having it here keeps the
      # "credentials_file_exists" field truthful.
      - key_data:/app/webreel-ai-agent/key:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
      - db-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Frontend (React SPA + Nginx reverse proxy) ---
  # Image nginx chinh thuc, da chay non-root san
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # /api de Nginx reverse proxy toi backend container
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
    container_name: webreel-frontend
    ports:
      - "3000:80"
    volumes:
      # Mount demo/test-case HTML files for /demo/ access
      - ./test-cases:/usr/share/nginx/demo:ro
    depends_on:
      - api
    networks:
      - frontend-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Web Worker (polls web-queue, runs pipeline + built-in Chrome) ---
  # Chay Chrome --no-sandbox duoi user webreel (ha quyen trong entrypoint)
  # cap_drop ALL: tuoc bo toan bo Linux capabilities (accepted risk vi Chrome --no-sandbox)
  web-worker:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    # Override CMD: entrypoint starts Xvfb (+ VNC/noVNC neu ENABLE_VNC=1), then drops to webreel
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["python", "-m", "worker.web_worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_OPTIONS="--max-old-space-size=2048"
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - CHROME_CDP_URL=http://localhost:9222
      - DISPLAY=:99
      - WORKER_ID=web-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - FPT_API_KEY=${FPT_API_KEY:-}
      - PYTHONIOENCODING=utf-8
      # Audio-sync tuning + tat VNC (xem ghi chu o presentation-gg-worker)
      - WEBREEL_FPS=${WEBREEL_FPS:-12}
      - PADDING_MS=${PADDING_MS:-300}
      - ENABLE_VNC=${ENABLE_VNC:-0}
    shm_size: "2gb"
    volumes:
      - output_data:/app/output
      - chrome_master_data:/app/chrome_master:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - db-net
    healthcheck:
      disable: true
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Entrypoint chay root can cac caps nay truoc khi ha quyen bang gosu:
      # - SETUID/SETGID: gosu doi user tu root -> webreel
      # - CHOWN: chown output volume va Chrome profile cho webreel
      # - FOWNER: chmod 1777 /tmp/.X11-unix (Xvfb socket)
      # - KILL: pkill orphan Xvfb/VNC/Chrome processes
      # - DAC_OVERRIDE: doc/ghi file khi chuyen ownership
      # Sau khi gosu exec, process webreel chi giu lai DAC_OVERRIDE (khong co hieu luc vi non-root)
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - KILL
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # --- Office Worker (polls office-queue, runs slide pipeline) ---
  # Khong chay Chrome, dung Dockerfile.backend
  # Khong can cap_drop ALL vi co the can mot so capabilities co ban cho LibreOffice
  office-worker:
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.backend
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    # Chay truc tiep duoi user webreel (UID 1000) - office worker khong can root
    user: "1000:1000"
    command: ["python", "-m", "worker.office_worker"]
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - WORKER_ID=office-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - PYTHONIOENCODING=utf-8
    volumes:
      - output_data:/app/output
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - db-net
    healthcheck:
      disable: true
    restart: "no"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # --- Presentation Worker (PowerPoint Online testing via Chrome) ---
  # Tuong tu web-worker: Chrome --no-sandbox duoi user webreel
  presentation-worker:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["python", "-m", "worker.presentation_worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_OPTIONS="--max-old-space-size=2048"
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - CHROME_CDP_URL=http://localhost:9222
      - DISPLAY=:99
      - WORKER_QUEUE=presentation-queue
      - WORKER_ID=presentation-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - FPT_API_KEY=${FPT_API_KEY:-}
      - PYTHONIOENCODING=utf-8
      - MS_CLIENT_ID=${MS_CLIENT_ID:-}
      - MS_CLIENT_SECRET=${MS_CLIENT_SECRET:-}
      - MS_TENANT_ID=${MS_TENANT_ID:-}
      - MS_BOT_EMAIL=${MS_BOT_EMAIL:-}
      # Audio-sync tuning + tat VNC (xem ghi chu o presentation-gg-worker)
      - WEBREEL_FPS=${WEBREEL_FPS:-12}
      - PADDING_MS=${PADDING_MS:-300}
      - ENABLE_VNC=${ENABLE_VNC:-0}
    shm_size: "2gb"
    volumes:
      - output_data:/app/output
      - chrome_master_data:/app/chrome_master:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - db-net
    healthcheck:
      disable: true
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - KILL
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # --- Presentation GG Worker (Google Slides via Chrome) ---
  # Tuong tu web-worker: Chrome --no-sandbox duoi user webreel
  presentation-gg-worker:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["python", "-m", "worker.presentation_gg_worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_OPTIONS="--max-old-space-size=2048"
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - CHROME_CDP_URL=http://localhost:9222
      - CHROME_PROFILE_DIR=/app/chrome_profile
      - DISPLAY=:99
      - WORKER_QUEUE=presentation-gg-queue
      - WORKER_ID=presentation-gg-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - FPT_API_KEY=${FPT_API_KEY:-}
      - PYTHONIOENCODING=utf-8
      # Audio-sync tuning cho moi truong Docker (xem trace_composer):
      # - WEBREEL_FPS thap hon -> capture loop de keep up, drift video<->trace giam
      # - PADDING_MS lon hon -> buffer giua narration va action ke tiep, tranh overlap
      - WEBREEL_FPS=${WEBREEL_FPS:-12}
      - PADDING_MS=${PADDING_MS:-300}
      # Tat VNC mac dinh de tiet kiem CPU/RAM (chi can Xvfb cho Chrome anti-bot)
      - ENABLE_VNC=${ENABLE_VNC:-0}
    shm_size: "2gb"
    volumes:
      - output_data:/app/output
      - chrome_master_data:/app/chrome_master:ro
      - key_data:/app/webreel-ai-agent/key:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - db-net
    healthcheck:
      disable: true
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - KILL
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # --- Docker Socket Proxy (bao ve docker.sock) ---
  # Thay vi mount truc tiep docker.sock vao autoscaler (rui ro cao),
  # dung proxy chi cho phep cac Docker API endpoint can thiet.
  # Neu autoscaler bi hack, ke tan cong KHONG the:
  #   - Tao container privileged (VOLUMES=0, BUILD=0)
  #   - Exec vao container khac (EXEC=0)
  #   - Mount filesystem cua host (VOLUMES=0)
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: webreel-docker-proxy
    restart: unless-stopped
    environment:
      # Mac dinh DENY tat ca, chi whitelist nhung gi autoscaler can:
      CONTAINERS: 1       # GET/POST /containers/* (list, create, start, stop, inspect, remove)
      INFO: 1             # GET /info (docker compose can de xac dinh engine)
      POST: 1             # Cho phep POST requests (create, start, stop container)
      IMAGES: 1           # GET /images/* (docker compose can check image ton tai)
      # TAT CA CAC QUYEN NGUY HIEM - KHONG BAO GIO BAT:
      AUTH: 0
      BUILD: 0            # Khong cho build image moi
      COMMIT: 0           # Khong cho commit container thanh image
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0             # QUAN TRONG: khong cho exec vao container khac
      GRPC: 0
      NETWORKS: 1         # Cho phep compose kiem tra va ket noi container vao network
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 1          # Cho phep compose check volumes cua worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxy-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M

  # --- Auto-Scaler (event-driven worker scaling) ---
  # KHONG con mount docker.sock truc tiep. Thay vao do ket noi qua
  # docker-socket-proxy (chi cho phep cac API can thiet).
  # Chay non-root (user webreel) + read-only filesystem + cap_drop ALL.
  # Ke ca khi bi chiem quyen, ke tan cong khong the:
  #   - Leo thang dac quyen (non-root + no-new-privileges + cap_drop ALL)
  #   - Tao container privileged (socket proxy chan)
  #   - Sua doi code autoscaler (read-only filesystem)
  #   - Exec vao container khac (socket proxy chan)
  autoscaler:
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.autoscaler
    container_name: webreel-autoscaler
    working_dir: /app/webreel-ai-agent
    # Chay non-root vi chi can goi HTTP toi socket proxy, khong can root
    user: "1000:1000"
    # Read-only filesystem: ke tan cong khong the sua doi code autoscaler
    read_only: true
    tmpfs:
      - /tmp
    command: ["python", "-m", "worker.autoscaler"]
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - MAX_WEB_WORKERS=${MAX_WEB_WORKERS:-2}
      - MAX_PRES_WORKERS=${MAX_PRES_WORKERS:-2}
      - MAX_PRES_GG_WORKERS=${MAX_PRES_GG_WORKERS:-2}
      - MAX_OFFICE_WORKERS=${MAX_OFFICE_WORKERS:-2}
      - COMPOSE_FILE=/compose/docker-compose.prod.yml
      - COMPOSE_PROJECT=webreel-ai-agent
      # Ket noi toi Docker Socket Proxy thay vi mount truc tiep docker.sock
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # Mongo: doc agent runtime config (API key + model) de inject
      # vao `docker compose run` cho moi job. Khong rebuild worker khi admin doi.
      - MONGO_URL=mongodb://${MONGO_USER:-webreel}:${MONGO_PASSWORD:-webreel_mongo_2026}@mongodb:27017
      - MONGO_DB=webreel
    volumes:
      # KHONG con mount docker.sock o day
      # Chi mount compose file de autoscaler doc cau hinh worker
      - .:/compose:ro
    depends_on:
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
      mongodb:
        condition: service_healthy
    networks:
      - backend-net
      - docker-proxy-net
      - db-net
    healthcheck:
      disable: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Session Manager (Master Chrome Profile + Freeze API) ---
  # Entrypoint chay root de setup Xvfb/VNC, sau do Chrome + API chay gosu webreel
  # cap_drop ALL: tuong tu workers, Chrome --no-sandbox duoi user webreel
  session-manager:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    container_name: webreel-session-manager
    # Khong expose port ra ngoai, noVNC truy cap qua Nginx reverse proxy /novnc/
    working_dir: /app/webreel-ai-agent
    entrypoint: ["/app/scripts/session-manager-start.sh"]
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
      - CHROME_PROFILE_DIR=/app/chrome_master
      - VNC_PORT=5900
      - NOVNC_PORT=6080
    volumes:
      - chrome_master_data:/app/chrome_master:rw
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - KILL
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Test Server (Nginx serving test HTML files) ---
  # Internal-only HTTP server for worker testing and demos.
  # Workers access via http://test-server/demoform.html
  # NOT exposed to host - only accessible within backend-net
  test-server:
    image: nginx:alpine
    container_name: webreel-test-server
    volumes:
      - ./test-cases:/usr/share/nginx/html:ro
      - ./test-cases/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    # No ports exposed - internal access only

volumes:
  mongodb_data:
  redis_data:
  output_data:
  chrome_profile_data:
  chrome_profile_gg_data:
  key_data:
  chrome_master_data:

networks:
  docker-proxy-net:
    driver: bridge
    internal: true
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  db-net:
    driver: bridge

# Tong RAM: 1G (MongoDB) + 320M (Redis) + 1G (API) + 128M (Frontend)
#         + 2G (Worker x N) + 128M (Autoscaler) + 64M (Socket Proxy)
# VPS 8GB: thoai mai voi max 2 workers moi loai.
# Autoscaler launch container rieng cho moi job, tu dong xoa khi xong.
