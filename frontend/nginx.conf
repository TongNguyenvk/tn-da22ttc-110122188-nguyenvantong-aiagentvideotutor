server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # Cloudflare Real IP restoration
    # Khi chay sau Cloudflare proxy, IP client that nam trong
    # header CF-Connecting-IP. Cau hinh nay giup Nginx log
    # dung IP that thay vi IP cua Cloudflare edge server.
    # -------------------------------------------------------
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache static assets (JS, CSS, images) aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy API requests to backend
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large video uploads
        client_max_body_size 200M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Reverse proxy admin routes (cookie management, noVNC URL, system status)
    # Chi proxy cac API endpoints thuc su de tranh tranh chap voi route giao dien cua React SPA (/admin/session, /admin/jobs, v.v.)
    location ~ ^/admin/(cookie-status|novnc-url|verify-cookies|system-status) {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy (API)
    location /ws/ {
        proxy_pass http://api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # noVNC reverse proxy (session-manager)
    # Cho phep admin truy cap giao dien noVNC qua /novnc/ thay vi
    # expose port 6080 truc tiep. WebSocket upgrade bat buoc de
    # VNC over WebSocket hoat dong.
    location ^~ /novnc/ {
        proxy_pass http://session-manager:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Static video files served by backend
    location /videos/ {
        proxy_pass http://api:8000/videos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://api:8000/health;
    }

    # Demo/test-case static HTML files (mounted via docker-compose volume)
    location /demo/ {
        alias /usr/share/nginx/demo/;
        index demoform.html;
        try_files $uri $uri/ =404;
    }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
